<!doctype html>
<html>
    <head>
        <meta http-equiv="content-security-policy" content="script-src 'self' 'unsafe-inline'" />
        <title>Helping Hands</title>
        <!-- Brand typography (Helping Hands UI Kit): Chakra Petch · IBM Plex Sans · JetBrains Mono -->
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            rel="stylesheet"
            href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@500;600;700&family=IBM+Plex+Sans:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500;700&display=swap"
        />
        <style>
            :root {
                /* Backgrounds — green-tinted near-black (UI Kit) */
                --bg-app: #060a07; /* --bg */
                --bg-surface: #0c120e; /* --surface */
                --bg-elevated: #121a15; /* --elev */
                --bg-hover: #18231b; /* --hover */

                /* Text — faint green-white */
                --text-primary: #e8fbee; /* --tx */
                --text-secondary: #8fb89c; /* --tx2 */
                --text-muted: #5a7563; /* --tx3 */

                /* Borders & Lines — green-tinted */
                --border: rgba(74, 240, 130, 0.14); /* --g-line */
                --border-strong: rgba(74, 240, 130, 0.26); /* --g-line2 */

                /* Accent — neon green brand (single source of truth) */
                --accent: #3be86b; /* --g */
                --accent-hover: #5cf088;
                --accent-soft: rgba(59, 232, 107, 0.12); /* --g-soft */
                --accent-gradient: linear-gradient(135deg, #3be86b, #12a24a); /* --g → --g2 */

                /* Status */
                --success: #28c840;
                --warning: #e0c93a;
                --danger: #ff5c57;

                /* Typography (UI Kit) — display / body / mono */
                --font-display: 'Chakra Petch', 'IBM Plex Sans', system-ui, sans-serif;
                --font: 'IBM Plex Sans', system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
                --font-mono: 'JetBrains Mono', ui-monospace, 'SF Mono', 'Menlo', 'Monaco', monospace;
                --font-size-xs: 11px;
                --font-size-sm: 13px;
                --font-size-base: 14px;
                --font-size-lg: 16px;
                --font-size-xl: 20px;
                --font-size-2xl: 28px;
                --font-weight-normal: 400;
                --font-weight-medium: 500;
                --font-weight-semibold: 600;
                --line-height: 1.6;

                /* Spacing */
                --space-xs: 4px;
                --space-sm: 8px;
                --space-md: 16px;
                --space-lg: 24px;
                --space-xl: 40px;
                --space-2xl: 64px;

                /* Radius — sci-fi HUD: hard edges, no rounded corners */
                --radius-sm: 0px;
                --radius-md: 0px;
                --radius-lg: 0px;
                --radius-xl: 0px;
                --radius-pill: 0px;
                /* HUD chamfer (angular corner cut) for panels/buttons via clip-path */
                --hud-cut: 10px;
                --hud-cut-sm: 6px;

                /* Elevation — soft, low-spread shadows for floating glass */
                --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.28);
                --shadow-md: 0 8px 24px rgba(0, 0, 0, 0.32);
                --shadow-lg: 0 16px 48px rgba(0, 0, 0, 0.42);
                --shadow-accent: 0 0 18px rgba(59, 232, 107, 0.45); /* --glow */
                --shadow-accent-lg: 0 0 34px rgba(59, 232, 107, 0.5); /* --glow-lg */

                /* Transitions */
                --transition: 160ms ease;

                /* Sidebar */
                --sidebar-width: 220px;
                --sidebar-width-collapsed: 60px;

                /* Legacy compatibility — mapped to new tokens */
                --background-transparent: transparent;
                --bg-primary: var(--bg-app);
                --bg-secondary: var(--bg-surface);
                --bg-tertiary: var(--bg-elevated);
                --text-color: var(--text-primary);
                --description-color: var(--text-secondary);
                --placeholder-color: var(--text-muted);
                --border-color: var(--border);
                --border-subtle: var(--border);
                --border-default: var(--border-strong);
                --header-background: var(--bg-surface);
                --header-actions-color: var(--text-secondary);
                --main-content-background: var(--bg-app);
                --button-background: transparent;
                --button-border: var(--border-strong);
                --icon-button-color: var(--text-secondary);
                --hover-background: var(--bg-hover);
                --input-background: var(--bg-elevated);
                --input-focus-background: var(--bg-elevated);
                --focus-border-color: var(--accent);
                --focus-box-shadow: transparent;
                --scrollbar-track: var(--bg-app);
                --scrollbar-thumb: var(--border-strong);
                --scrollbar-thumb-hover: #2c3f31;
                --scrollbar-background: var(--bg-app);
                --start-button-background: var(--accent);
                --start-button-color: #04140a;
                --start-button-border: var(--accent);
                --start-button-hover-background: var(--accent-hover);
                --start-button-hover-border: var(--accent-hover);
                --text-input-button-background: var(--accent);
                --text-input-button-hover: var(--accent-hover);
                --link-color: var(--accent);
                --key-background: var(--bg-elevated);
                --success-color: var(--success);
                --warning-color: var(--warning);
                --error-color: var(--danger);
                --danger-color: var(--danger);
                --preview-video-background: var(--bg-surface);
                --preview-video-border: var(--border);
                --option-label-color: var(--text-primary);
                --screen-option-background: var(--bg-surface);
                --screen-option-hover-background: var(--bg-elevated);
                --screen-option-selected-background: var(--bg-hover);
                --screen-option-text: var(--text-secondary);

                /* Layout-specific */
                --header-padding: 8px 16px;
                --header-font-size: 14px;
                --header-gap: 8px;
                --header-button-padding: 6px 12px;
                --header-icon-padding: 6px;
                --header-font-size-small: 12px;
                --main-content-padding: 16px;
                --main-content-margin-top: 0;
                --icon-size: 18px;
                --border-radius: var(--radius-sm);
                --content-border-radius: 0;
            }

            html {
                margin: 0;
                padding: 0;
                height: 100%;
                overflow: hidden;
                border-radius: 16px;
                background: transparent;
            }

            body {
                margin: 0;
                padding: 0;
                height: 100%;
                overflow: hidden;
                background: var(--bg-app);
                color: var(--text-primary);
                line-height: var(--line-height);
                border-radius: 12px;
                border: 1px solid var(--border);
                font-family: var(--font);
                font-size: var(--font-size-base);
                font-weight: var(--font-weight-normal);
                -webkit-font-smoothing: antialiased;
                -moz-osx-font-smoothing: grayscale;
            }


            * {
                box-sizing: border-box;
            }

            :focus-visible {
                outline: 2px solid var(--accent);
                outline-offset: 2px;
            }

            ::-webkit-scrollbar {
                width: 6px;
                height: 6px;
            }

            ::-webkit-scrollbar-track {
                background: transparent;
            }

            ::-webkit-scrollbar-thumb {
                background: var(--border-strong);
                border-radius: 3px;
            }

            ::-webkit-scrollbar-thumb:hover {
                background: #444444;
            }

            helping-hands-app {
                display: block;
                width: 100%;
                height: 100%;
            }
        </style>
    </head>
    <body>
        <script src="assets/marked-4.3.0.min.js"></script>
        <script src="assets/highlight-11.9.0.min.js"></script>
        <link rel="stylesheet" href="assets/highlight-vscode-dark.min.css" />
        <script type="module" src="components/app/HelpingHandsApp.js"></script>

        <helping-hands-app id="helpingHands"></helping-hands-app>
        <script src="script.js"></script>
        <script src="utils/renderer.js"></script>
    </body>
</html>
